<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude API Proxy Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 24px; color: #1a1a1a; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1100px; }
  .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 16px; color: #555; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .card h2 button { font-size: 13px; padding: 4px 14px; border: 1px solid #d0d0d0; border-radius: 6px; background: #fff; cursor: pointer; color: #555; }
  .card h2 button:hover { background: #f0f0f0; }
  .card h2 button:disabled { opacity: 0.5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
  th { color: #888; font-weight: 500; font-size: 13px; }
  td { color: #333; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .tag-green { background: #e6f7e6; color: #2a7a2a; }
  .tag-yellow { background: #fff7e0; color: #8a6d00; }
  .tag-red { background: #fde8e8; color: #a33; }
  .empty { color: #aaa; font-size: 14px; padding: 30px 0; text-align: center; }
  .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
  .model-item { padding: 7px 10px; background: #f8f8f8; border-radius: 6px; font-size: 13px; font-family: monospace; }
  .updated { font-size: 12px; color: #aaa; margin-top: 12px; }
  @media (max-width: 768px) { .cards { grid-template-columns: 1fr; } .model-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>Claude API Proxy Dashboard</h1>
<div class="cards">
  <div class="card">
    <h2>Speed Limits<button id="btn-limits" onclick="fetchLimits()">Refresh</button></h2>
    <div id="limits-content"><div class="empty">Loading...</div></div>
    <div id="limits-updated" class="updated"></div>
  </div>
  <div class="card">
    <h2>Available Models<button id="btn-models" onclick="fetchModels()">Refresh</button></h2>
    <div id="models-content"><div class="empty">Loading...</div></div>
  </div>
</div>
<script>
const LABELS = {
  'anthropic-ratelimit-requests-limit': ['Requests Limit', '/min'],
  'anthropic-ratelimit-requests-remaining': ['Requests Remaining', ''],
  'anthropic-ratelimit-requests-reset': ['Requests Reset', ''],
  'anthropic-ratelimit-tokens-limit': ['Tokens Limit', '/min'],
  'anthropic-ratelimit-tokens-remaining': ['Tokens Remaining', ''],
  'anthropic-ratelimit-tokens-reset': ['Tokens Reset', ''],
  'anthropic-ratelimit-input-tokens-limit': ['Input Tokens Limit', '/min'],
  'anthropic-ratelimit-input-tokens-remaining': ['Input Tokens Remaining', ''],
  'anthropic-ratelimit-input-tokens-reset': ['Input Tokens Reset', ''],
  'anthropic-ratelimit-output-tokens-limit': ['Output Tokens Limit', '/min'],
  'anthropic-ratelimit-output-tokens-remaining': ['Output Tokens Remaining', ''],
  'anthropic-ratelimit-output-tokens-reset': ['Output Tokens Reset', ''],
  'retry-after': ['Retry After', 's']
};

function pct(remaining, limit) {
  if (!remaining || !limit) return null;
  return Math.round((parseInt(remaining) / parseInt(limit)) * 100);
}

function pctTag(val) {
  if (val === null) return '';
  const cls = val > 50 ? 'tag-green' : val > 20 ? 'tag-yellow' : 'tag-red';
  return `<span class="tag ${cls}">${val}%</span>`;
}

async function fetchLimits() {
  const btn = document.getElementById('btn-limits');
  btn.disabled = true;
  try {
    const res = await fetch('/rate-limits');
    const data = await res.json();
    const el = document.getElementById('limits-content');
    const upd = document.getElementById('limits-updated');
    if (!data.updatedAt) {
      el.innerHTML = '<div class="empty">No data yet. Send an API request first.</div>';
      upd.textContent = '';
      return;
    }
    const h = data.headers;
    const rows = Object.keys(LABELS).filter(k => h[k] !== undefined).map(k => {
      const [label, unit] = LABELS[k];
      let extra = '';
      if (k.endsWith('-remaining')) {
        const limitKey = k.replace('-remaining', '-limit');
        extra = pctTag(pct(h[k], h[limitKey]));
      }
      const val = k.endsWith('-reset') ? new Date(h[k]).toLocaleTimeString() : h[k] + unit;
      return `<tr><td>${label}</td><td>${val} ${extra}</td></tr>`;
    }).join('');
    el.innerHTML = rows ? `<table><tr><th>Metric</th><th>Value</th></tr>${rows}</table>` : '<div class="empty">No rate limit headers found.</div>';
    upd.textContent = 'Updated: ' + new Date(data.updatedAt).toLocaleString();
  } catch (e) {
    document.getElementById('limits-content').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

async function fetchModels() {
  const btn = document.getElementById('btn-models');
  btn.disabled = true;
  try {
    const res = await fetch('/v1/models', { headers: { 'anthropic-version': '2023-06-01' } });
    const data = await res.json();
    const el = document.getElementById('models-content');
    const models = (data.data || []).map(m => m.id).sort();
    if (models.length === 0) {
      el.innerHTML = '<div class="empty">No models found.</div>';
      return;
    }
    el.innerHTML = '<div class="model-grid">' + models.map(m => `<div class="model-item">${m}</div>`).join('') + '</div>';
  } catch (e) {
    document.getElementById('models-content').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

fetchLimits();
fetchModels();
</script>
</body>
</html>
