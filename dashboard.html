<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude API Proxy Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 24px; color: #1a1a1a; }
  .cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; max-width: 1400px; }
  .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 16px; color: #555; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .card h2 .btns { display: flex; gap: 6px; }
  .card h2 button { font-size: 13px; padding: 4px 14px; border: 1px solid #d0d0d0; border-radius: 6px; background: #fff; cursor: pointer; color: #555; }
  .card h2 button:hover { background: #f0f0f0; }
  .card h2 button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #4a90d9 !important; color: #fff !important; border-color: #3a7bc8 !important; }
  .btn-primary:hover { background: #3a7bc8 !important; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
  th { color: #888; font-weight: 500; font-size: 13px; }
  td { color: #333; word-break: break-all; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .tag-green { background: #e6f7e6; color: #2a7a2a; }
  .tag-yellow { background: #fff7e0; color: #8a6d00; }
  .tag-red { background: #fde8e8; color: #a33; }
  .tag-blue { background: #e6f0ff; color: #2a5a9a; }
  .tag-gray { background: #f0f0f0; color: #666; }
  .empty { color: #aaa; font-size: 14px; padding: 30px 0; text-align: center; }
  .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
  .model-item { padding: 7px 10px; background: #f8f8f8; border-radius: 6px; font-size: 13px; font-family: monospace; }
  .updated { font-size: 12px; color: #aaa; margin-top: 12px; }
  .oauth-box { margin-top: 14px; padding: 14px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e0e0e0; }
  .oauth-box input[type="text"] { width: 100%; padding: 8px 10px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 13px; font-family: monospace; margin: 6px 0; }
  .oauth-box .hint { font-size: 12px; color: #999; margin-top: 4px; line-height: 1.6; }
  .oauth-box .hint code { background: #e8e8e8; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
  .oauth-box label { font-size: 14px; font-weight: 500; display: block; margin-bottom: 4px; }
  .alert-bar { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
  .alert-success { background: #e6f7e6; color: #2a7a2a; border: 1px solid #b5e8b5; display: block; }
  .alert-error { background: #fde8e8; color: #a33; border: 1px solid #f5c6c6; display: block; }
  .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 1024px) { .cards { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 768px) { .cards { grid-template-columns: 1fr; } .model-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>Claude API Proxy Dashboard</h1>
<div id="alert-bar" class="alert-bar"></div>
<div class="cards">
  <div class="card">
    <h2>Auth Status<div class="btns"><button id="btn-login" onclick="showLoginForm()" class="btn-primary">Login</button><button id="btn-auth" onclick="fetchAuth()">Refresh</button></div></h2>
    <div id="auth-content"><div class="empty">Loading...</div></div>
    <div id="login-form"></div>
  </div>
  <div class="card">
    <h2>Speed Limits<button id="btn-limits" onclick="fetchLimits()">Refresh</button></h2>
    <div id="limits-content"><div class="empty">Loading...</div></div>
    <div id="limits-updated" class="updated"></div>
  </div>
  <div class="card">
    <h2>Available Models<button id="btn-models" onclick="fetchModels()">Refresh</button></h2>
    <div id="models-content"><div class="empty">Loading...</div></div>
  </div>
</div>
<script>
var LABELS = {
  'anthropic-ratelimit-requests-limit': ['Requests Limit', '/min'],
  'anthropic-ratelimit-requests-remaining': ['Requests Remaining', ''],
  'anthropic-ratelimit-requests-reset': ['Requests Reset', ''],
  'anthropic-ratelimit-tokens-limit': ['Tokens Limit', '/min'],
  'anthropic-ratelimit-tokens-remaining': ['Tokens Remaining', ''],
  'anthropic-ratelimit-tokens-reset': ['Tokens Reset', ''],
  'anthropic-ratelimit-input-tokens-limit': ['Input Tokens Limit', '/min'],
  'anthropic-ratelimit-input-tokens-remaining': ['Input Tokens Remaining', ''],
  'anthropic-ratelimit-input-tokens-reset': ['Input Tokens Reset', ''],
  'anthropic-ratelimit-output-tokens-limit': ['Output Tokens Limit', '/min'],
  'anthropic-ratelimit-output-tokens-remaining': ['Output Tokens Remaining', ''],
  'anthropic-ratelimit-output-tokens-reset': ['Output Tokens Reset', ''],
  'retry-after': ['Retry After', 's']
};

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pct(r,l) { if(!r||!l)return null; return Math.round((parseInt(r)/parseInt(l))*100); }
function pctTag(v) { if(v===null)return''; var c=v>50?'tag-green':v>20?'tag-yellow':'tag-red'; return '<span class="tag '+c+'">'+v+'%</span>'; }

async function fetchAuth() {
  document.getElementById('btn-auth').disabled = true;
  try {
    var res = await fetch('/auth-status');
    var d = await res.json();
    var el = document.getElementById('auth-content');
    var modeTag = d.mode==='apikey' ? '<span class="tag tag-blue">API Key</span>'
      : d.mode==='oauth' ? '<span class="tag tag-green">OAuth</span>'
      : '<span class="tag tag-gray">Not Configured</span>';
    var rows = '<tr><td>Mode</td><td>'+modeTag+'</td></tr>'
      +'<tr><td>Source</td><td>'+esc(d.source)+'</td></tr>'
      +'<tr><td>Token</td><td><code>'+esc(d.tokenMasked)+'</code></td></tr>';
    if (d.expiresAt) rows += '<tr><td>Expires</td><td>'+new Date(d.expiresAt).toLocaleString()+'</td></tr>';
    if (d.hasRefreshToken) rows += '<tr><td>Refresh</td><td><span class="tag tag-green">Available</span></td></tr>';
    if (d.lastReadAt) rows += '<tr><td>Last Update</td><td>'+new Date(d.lastReadAt).toLocaleString()+'</td></tr>';
    if (d.lastError) rows += '<tr><td>Error</td><td><span class="tag tag-red">'+esc(d.lastError)+'</span></td></tr>';
    el.innerHTML = '<table><tr><th>Property</th><th>Value</th></tr>'+rows+'</table>';
  } catch(e) {
    document.getElementById('auth-content').innerHTML = '<div class="empty">Error: '+e.message+'</div>';
  } finally { document.getElementById('btn-auth').disabled = false; }
}

function showLoginForm() {
  var el = document.getElementById('login-form');
  el.innerHTML = '<div class="oauth-box">'
    +'<label>SessionKey Login</label>'
    +'<div class="hint">'
    +'How to get sessionKey:<br>'
    +'1. Open <a href="https://claude.ai" target="_blank">claude.ai</a> in any browser where you are logged in<br>'
    +'2. Press F12 &rarr; Application &rarr; Cookies &rarr; <code>claude.ai</code><br>'
    +'3. Find the <code>sessionKey</code> cookie and copy its value<br>'
    +'</div>'
    +'<input type="text" id="session-key-input" placeholder="Paste your sessionKey cookie value here">'
    +'<button id="btn-submit-session" onclick="submitSessionKey()" class="btn-primary" style="margin-top:8px;padding:6px 20px">Login with SessionKey</button>'
    +'</div>';
}

async function submitSessionKey() {
  var input = document.getElementById('session-key-input').value.trim();
  if (!input) { alert('Please paste the sessionKey'); return; }

  var btn = document.getElementById('btn-submit-session');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>Logging in...';

  try {
    var res = await fetch('/auth-session-login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ sessionKey: input }),
    });
    var d = await res.json();
    if (d.ok) {
      document.getElementById('login-form').innerHTML = '<div class="oauth-box">'
        +'<span class="tag tag-green">Login Successful!</span> Token: <code>'+esc(d.token)+'</code>'
        +'<div class="hint">Expires: '+(d.expiresAt||'N/A')+'</div></div>';
      fetchAuth();
    } else {
      alert('Login failed: ' + (d.error||'Unknown error'));
      btn.disabled = false;
      btn.textContent = 'Login with SessionKey';
    }
  } catch(e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Login with SessionKey';
  }
}

async function fetchLimits() {
  document.getElementById('btn-limits').disabled = true;
  try {
    var res = await fetch('/rate-limits');
    var data = await res.json();
    var el = document.getElementById('limits-content');
    var upd = document.getElementById('limits-updated');
    if (!data.updatedAt) { el.innerHTML='<div class="empty">No data yet.</div>'; upd.textContent=''; return; }
    var h = data.headers;
    var rows = Object.keys(LABELS).filter(function(k){return h[k]!==undefined;}).map(function(k){
      var label=LABELS[k][0],unit=LABELS[k][1],extra='';
      if(k.endsWith('-remaining')){extra=pctTag(pct(h[k],h[k.replace('-remaining','-limit')]));}
      var val=k.endsWith('-reset')?new Date(h[k]).toLocaleTimeString():h[k]+unit;
      return '<tr><td>'+label+'</td><td>'+val+' '+extra+'</td></tr>';
    }).join('');
    el.innerHTML = rows ? '<table><tr><th>Metric</th><th>Value</th></tr>'+rows+'</table>' : '<div class="empty">No rate limit headers.</div>';
    upd.textContent = 'Updated: '+new Date(data.updatedAt).toLocaleString();
  } catch(e) { document.getElementById('limits-content').innerHTML='<div class="empty">Error: '+e.message+'</div>'; }
  finally { document.getElementById('btn-limits').disabled = false; }
}

async function fetchModels() {
  document.getElementById('btn-models').disabled = true;
  try {
    var res = await fetch('/v1/models', { headers: { 'anthropic-version': '2023-06-01' } });
    var data = await res.json();
    var el = document.getElementById('models-content');
    var models = (data.data||[]).map(function(m){return m.id;}).sort();
    if (!models.length) { el.innerHTML='<div class="empty">No models found.</div>'; return; }
    el.innerHTML = '<div class="model-grid">'+models.map(function(m){return '<div class="model-item">'+m+'</div>';}).join('')+'</div>';
  } catch(e) { document.getElementById('models-content').innerHTML='<div class="empty">Error: '+e.message+'</div>'; }
  finally { document.getElementById('btn-models').disabled = false; }
}

fetchAuth(); fetchLimits(); fetchModels();
</script>
</body>
</html>
